<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS 资料预览</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-header-left">
        <h1>IELTS 雅思备考资料库</h1>
        <p>按听力、阅读、写作、口语分类预览，支持 PDF、音频、图片、Markdown</p>
      </div>
      <div class="app-header-right">
        <div class="learning-dropdown-wrap">
          <button type="button" id="learning-dropdown-trigger" class="learning-dropdown-trigger" aria-haspopup="true" aria-expanded="false">
            推荐学习平台
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true"><path d="M2.5 4.5L6 8l3.5-3.5"/></svg>
          </button>
          <div id="learning-dropdown-panel" class="learning-dropdown-panel-wrap" role="menu"></div>
        </div>
        <a href="https://github.com/zeeklog/IETLS" target="_blank" rel="noopener noreferrer" class="app-header-github" aria-label="GitHub 仓库">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
      </div>
    </header>

    <main class="app-main">
      <aside class="sidebar">
        <nav id="nav" class="nav">
          <div id="nav-items" class="nav-items"></div>
        </nav>
        <div id="file-list-wrap">
          <div id="file-list"></div>
        </div>
      </aside>

      <section class="content">
        <div id="preview">
          <p class="preview-placeholder">选择左侧文件进行预览</p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/path-data.js"></script>
  <script src="js/md-content.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/tips.js"></script>
  <script src="js/learning-links.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
